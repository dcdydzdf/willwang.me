<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Content Manager | Will Wang</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
    <script>
      CMS.registerPreviewStyle("/admin/preview.css");

      var h = window.h;
      var ArticlePreview = createClass({
        render: function () {
          var entry = this.props.entry;
          var category = entry.getIn(["data", "category"]) || "article";
          var date = entry.getIn(["data", "date"]) || "";

          return h("article", { className: "preview-article" }, [
            h("header", { className: "preview-header", key: "header" }, [
              h("span", { className: "preview-badge", key: "badge" }, category),
              h("h1", { key: "title" }, entry.getIn(["data", "title"]) || "Untitled"),
              h("time", { key: "date" }, date),
            ]),
            h("div", { className: "preview-body", key: "body" }, this.props.widgetFor("body")),
          ]);
        },
      });

      ["industry", "literature", "reflections"].forEach(function (collection) {
        CMS.registerPreviewTemplate(collection, ArticlePreview);
      });
    </script>
  </body>
</html>
